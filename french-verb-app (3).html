<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Conjugaison · 法语动词变位</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --paper: #f5f0e8;
  --cream: #ede8dc;
  --accent: #c4382b;
  --gold: #b8922a;
  --muted: #7a6e5f;
  --border: #d4cbbf;
  --highlight: #fff8e7;
  --green: #2a7a3b;
  --sidebar-w: 260px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Mono', monospace;
  background: var(--paper);
  color: var(--ink);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 200;
}
.logo { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; }
.logo span { color: var(--gold); }
.header-right { display: flex; align-items: center; gap: 16px; }

/* Level badge in header */
.level-badge {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: 1px;
}
.level-badge-icon { font-size: 16px; }
.level-badge-name { color: var(--gold); font-size: 11px; letter-spacing: 1px; }
.level-badge-xp { color: rgba(255,255,255,0.5); font-size: 10px; }
.xp-bar-wrap {
  width: 70px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px;
}
.xp-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.6s ease; }

.menu-btn {
  display: none; background: none; border: none; cursor: pointer;
  color: var(--paper); font-size: 20px; padding: 4px;
}

/* ── LAYOUT ──────────────────────────────────────── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); background: var(--cream); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
.sidebar-search {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
}
.search-input {
  width: 100%; padding: 8px 10px; background: var(--paper);
  border: 1px solid var(--border); font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--ink); outline: none;
}
.search-input::placeholder { color: var(--muted); }
.count-label { font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 1px; }
.verb-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.group-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  padding: 12px 14px 4px; font-weight: 500;
}
.verb-item {
  padding: 9px 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: space-between;
  transition: background 0.1s; border-left: 3px solid transparent;
}
.verb-item:hover { background: rgba(0,0,0,0.04); }
.verb-item.active { background: var(--paper); border-left-color: var(--accent); }
.vi-left { display: flex; flex-direction: column; gap: 1px; }
.vi-fr { font-family: 'Playfair Display', serif; font-size: 14px; font-style: italic; }
.vi-zh { font-size: 10px; color: var(--muted); }
.vi-irr { font-size: 9px; color: var(--accent); letter-spacing: 1px; border: 1px solid var(--accent); padding: 1px 4px; }

/* ── MAIN ────────────────────────────────────────── */
.main { flex: 1; overflow-y: auto; }

/* ── WELCOME ─────────────────────────────────────── */
.welcome {
  display: flex; align-items: center; justify-content: center;
  height: 100%; padding: 40px 20px;
}
.welcome-inner { max-width: 440px; text-align: center; }
.welcome-title {
  font-family: 'Playfair Display', serif; font-size: 48px;
  font-style: italic; margin-bottom: 8px;
}
.welcome-sub { color: var(--muted); font-size: 12px; letter-spacing: 2px; margin-bottom: 32px; }
.welcome-stats { display: flex; gap: 32px; justify-content: center; margin-bottom: 32px; }
.ws-item { text-align: center; }
.ws-num { font-size: 32px; font-family: 'Playfair Display', serif; display: block; }
.ws-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.ws-xp { color: var(--gold); }

/* ── VERB PAGE ───────────────────────────────────── */
.verb-page { padding: 28px 32px; max-width: 760px; }
.verb-hero {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.vh-title {
  font-family: 'Playfair Display', serif;
  font-size: 56px; font-style: italic; line-height: 1;
}
.vh-speak-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--ink); background: transparent;
  color: var(--ink); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; margin-top: 8px; flex-shrink: 0;
}
.vh-speak-btn:hover { background: var(--ink); color: var(--paper); }
.vh-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.vh-meaning { font-size: 14px; color: var(--muted); }
.tags { display: flex; gap: 6px; }
.tag { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border: 1px solid var(--border); }
.tag.irr { border-color: var(--accent); color: var(--accent); }

/* ── MODE TABS ───────────────────────────────────── */
.mode-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.mode-tab {
  padding: 10px 20px; background: none; border: none;
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.15s;
}
.mode-tab:hover { color: var(--ink); }
.mode-tab.active { color: var(--ink); border-bottom-color: var(--accent); }

/* ── TENSE NAV ───────────────────────────────────── */
.tense-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tense-btn {
  padding: 6px 14px; background: none; border: 1px solid var(--border);
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.tense-btn:hover { border-color: var(--ink); color: var(--ink); }
.tense-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ── CONJ GRID ───────────────────────────────────── */
.speak-all-btn {
  display: inline-flex; align-items: center; gap: 6px;
  margin-bottom: 12px; padding: 6px 14px;
  border: 1px solid var(--border); background: var(--paper);
  color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.speak-all-btn:hover, .speak-all-btn.active { border-color: var(--accent); color: var(--accent); }
.conj-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border); margin-bottom: 28px;
}
.conj-cell {
  background: var(--paper); padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.cc-left { display: flex; flex-direction: column; gap: 3px; }
.cc-pron { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
.cc-form { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; }
.cc-end { color: var(--accent); }
.speak-btn {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; padding: 0;
}
.speak-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff5f5; }
.speak-btn.speaking { border-color: var(--accent); color: var(--accent); background: #fff5f5; }

/* ── SECTION LABEL ───────────────────────────────── */
.section-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); border-bottom: 1px solid var(--border);
  padding-bottom: 8px; margin-bottom: 16px;
}

/* ── EXAMPLES ────────────────────────────────────── */
.examples { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
.example {
  padding: 12px 14px; border-left: 3px solid var(--border);
  background: var(--highlight); display: flex;
  align-items: flex-start; justify-content: space-between; gap: 12px;
}
.ex-text { flex: 1; }
.ex-fr { font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic; margin-bottom: 3px; }
.ex-zh { font-size: 11px; color: var(--muted); }
.ex-speak { flex-shrink: 0; margin-top: 2px; }

/* ── PASSAGE (时态短文) ──────────────────────────── */
.passage-wrap { margin-bottom: 28px; }
.passage-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.passage-title { font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; }
.passage-title-zh { font-size: 11px; color: var(--muted); }
.passage-text {
  background: var(--highlight); border: 1px solid var(--border);
  padding: 18px 20px; font-family: 'Playfair Display', serif;
  font-size: 16px; font-style: italic; line-height: 2;
  margin-bottom: 10px;
}
.ph { color: var(--accent); font-weight: 700; }
.passage-zh {
  font-size: 12px; color: var(--muted); line-height: 1.8;
  padding: 0 4px; margin-bottom: 10px;
}
.passage-note {
  font-size: 11px; background: #fff8e7; border-left: 3px solid var(--gold);
  padding: 8px 12px; color: var(--ink);
}
.passage-actions { display: flex; gap: 8px; margin-bottom: 14px; }
.passage-speak-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border: 1px solid var(--border);
  background: var(--paper); color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  transition: all 0.15s;
}
.passage-speak-btn:hover { border-color: var(--accent); color: var(--accent); }
.ai-passage-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border: 1px solid var(--gold);
  background: var(--paper); color: var(--gold);
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  transition: all 0.15s;
}
.ai-passage-btn:hover { background: var(--gold); color: var(--paper); }
.ai-passage-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── AI EXAMPLES ─────────────────────────────────── */
.ai-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: 1px solid var(--gold);
  background: transparent; color: var(--gold);
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; margin-bottom: 8px;
}
.ai-btn:hover:not(:disabled) { background: var(--gold); color: var(--paper); }
.ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ai-label { color: var(--gold) !important; border-bottom-color: var(--gold) !important; }
.ai-ex { border-left-color: var(--accent) !important; }
.ai-loading { display: flex; gap: 6px; padding: 16px 0; align-items: center; }
.ai-loading span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold); animation: aiPulse 1s ease-in-out infinite;
}
.ai-loading span:nth-child(2) { animation-delay: 0.15s; }
.ai-loading span:nth-child(3) { animation-delay: 0.3s; }
@keyframes aiPulse {
  0%,100% { opacity:0.3; transform:scale(0.8); }
  50% { opacity:1; transform:scale(1.2); }
}

/* ── QUIZ ────────────────────────────────────────── */
.quiz-stats { display: flex; gap: 20px; margin-bottom: 20px; }
.qs-item { display: flex; flex-direction: column; gap: 2px; }
.qs-num { font-size: 28px; font-family: 'Playfair Display', serif; }
.qs-num.correct { color: var(--green); }
.qs-num.wrong { color: var(--accent); }
.qs-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.quiz-card {
  border: 2px solid var(--ink); background: var(--highlight);
  padding: 28px 24px; text-align: center; margin-bottom: 16px;
}
.qc-tense { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.qc-verb { font-family: 'Playfair Display', serif; font-size: 38px; font-style: italic; margin-bottom: 4px; }
.qc-pron { font-size: 13px; color: var(--muted); margin-bottom: 20px; letter-spacing: 1px; }
.quiz-input {
  width: min(260px, 90%); padding: 12px 16px;
  font-family: 'Playfair Display', serif; font-size: 20px;
  font-style: italic; text-align: center;
  border: 2px solid var(--ink); background: var(--paper);
  color: var(--ink); outline: none; display: block; margin: 0 auto 14px;
  transition: border-color 0.2s;
}
.quiz-input.correct { border-color: var(--green); background: #f0fff4; }
.quiz-input.wrong { border-color: var(--accent); background: #fff5f5; }
.quiz-feedback { font-size: 13px; text-align: center; min-height: 20px; margin-bottom: 12px; }
.quiz-feedback.correct { color: var(--green); }
.quiz-feedback.wrong { color: var(--accent); }
.quiz-btn {
  padding: 10px 28px; background: var(--ink); color: var(--paper);
  border: none; font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  display: block; margin: 0 auto;
}
.quiz-history { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 16px; }
.qh-dot { width: 10px; height: 10px; border-radius: 50%; }
.qh-dot.correct { background: var(--green); }
.qh-dot.wrong { background: var(--accent); }
.xp-gain { font-size: 11px; color: var(--gold); margin-top: 6px; letter-spacing: 1px; text-align: center; }

/* ── CARDS ───────────────────────────────────────── */
.card-scene { perspective: 800px; height: 200px; margin-bottom: 20px; cursor: pointer; }
.card-inner {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d; transition: transform 0.5s;
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  border: 2px solid var(--ink); backface-visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--highlight);
}
.card-face.back { transform: rotateY(180deg); background: var(--cream); }
.card-pron { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
.card-form { font-family: 'Playfair Display', serif; font-size: 42px; font-style: italic; }
.card-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
.fc-controls { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 16px; }
.fc-btn {
  padding: 8px 20px; border: 1.5px solid var(--ink);
  background: var(--paper); color: var(--ink);
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
}
.fc-btn:hover, .fc-btn.primary { background: var(--ink); color: var(--paper); }
.fc-counter { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-align: center; }

/* ── LEVEL-UP TOAST ──────────────────────────────── */
.levelup-toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: var(--paper); padding: 14px 28px;
  font-size: 14px; letter-spacing: 1px; z-index: 999;
  transition: transform 0.4s ease, opacity 0.4s ease; opacity: 0;
  white-space: nowrap;
}
.levelup-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.levelup-toast b { color: var(--gold); }

/* ── XP POPUP ────────────────────────────────────── */
.xp-popup {
  position: fixed; pointer-events: none; z-index: 998;
  font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--gold); font-weight: bold;
  animation: xpFloat 1.2s ease-out forwards;
}
@keyframes xpFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}

/* ── SCROLLBAR ───────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── SIDEBAR OVERLAY ─────────────────────────────── */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

/* ── MOBILE ──────────────────────────────────────── */
@media (max-width: 640px) {
  .menu-btn { display: flex; }
  .level-badge-name, .xp-bar-wrap { display: none; }
  .sidebar {
    position: fixed; top: 56px; left: 0; bottom: 0;
    width: 280px; transform: translateX(-100%); z-index: 150;
    box-shadow: 4px 0 20px rgba(0,0,0,0.2);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .verb-page { padding: 20px 16px; }
  .vh-title { font-size: 38px; }
  .conj-grid { grid-template-columns: 1fr 1fr; }
  .tense-nav { overflow-x: auto; }
  .quiz-card { padding: 20px 14px; }
  .qc-verb { font-size: 28px; }
  .passage-text { font-size: 14px; }
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="logo">Conjugaison <span>·</span> 法语动词变位</div>
  </div>
  <div class="header-right">
    <div class="level-badge">
      <span class="level-badge-icon" id="lvIcon">🌱</span>
      <div>
        <div class="level-badge-name" id="lvName">初学者</div>
        <div class="level-badge-xp" id="lvXP">0 XP</div>
      </div>
      <div class="xp-bar-wrap" id="xpBarWrap" title="">
        <div class="xp-bar" id="xpBar" style="width:0%"></div>
      </div>
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <input class="search-input" id="searchInput" placeholder="搜索动词…" oninput="filterVerbs()">
      <div class="count-label"><span id="countLabel">0</span> 个动词</div>
    </div>
    <div class="verb-list" id="verbList"></div>
  </div>

  <main class="main" id="mainArea">
    <div class="welcome">
      <div class="welcome-inner">
        <div class="welcome-title">Conjugaison</div>
        <div class="welcome-sub">法语动词变位学习</div>
        <div class="welcome-stats">
          <div class="ws-item">
            <span class="ws-num" id="wsTotalVerbs">—</span>
            <span class="ws-label">动词</span>
          </div>
          <div class="ws-item">
            <span class="ws-num">5</span>
            <span class="ws-label">时态</span>
          </div>
          <div class="ws-item">
            <span class="ws-num ws-xp" id="wsXP">0</span>
            <span class="ws-label">XP 经验值</span>
          </div>
        </div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:1px;">← 从侧边栏选择一个动词开始</div>
      </div>
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════
const PRONOUNS = ["je / j'", "tu", "il / elle", "nous", "vous", "ils / elles"];
const TENSES = [
  { key:"pres",  zh:"现在时",     fr:"présent" },
  { key:"imp",   zh:"未完成过去", fr:"imparfait" },
  { key:"fut",   zh:"将来时",     fr:"futur" },
  { key:"cond",  zh:"条件式",     fr:"conditionnel" },
  { key:"subj",  zh:"虚拟式",     fr:"subjonctif" },
];

// ══════════════════════════════════════════════════════
// LEVELS
// ══════════════════════════════════════════════════════
const LEVELS = [
  { id:1, name:"Débutant",     zh:"初学者", minXP:0,    icon:"🌱", color:"#5a9e6f" },
  { id:2, name:"Élémentaire",  zh:"基础",   minXP:60,   icon:"📖", color:"#4a8fb5" },
  { id:3, name:"Intermédiaire",zh:"中级",   minXP:180,  icon:"⚡", color:"#b8922a" },
  { id:4, name:"Avancé",       zh:"高级",   minXP:400,  icon:"🔥", color:"#c4382b" },
  { id:5, name:"Expert",       zh:"专家",   minXP:800,  icon:"👑", color:"#7b3fa0" },
  { id:6, name:"Maître",       zh:"大师",   minXP:1400, icon:"✦", color:"#1a1208" },
];

function getLevel(xp) {
  let lv = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.minXP) lv = l; }
  return lv;
}
function getNextLevel(xp) {
  for (const l of LEVELS) { if (xp < l.minXP) return l; }
  return null;
}
function getXPProgress(xp) {
  const cur = getLevel(xp);
  const nxt = getNextLevel(xp);
  if (!nxt) return 100;
  return Math.round((xp - cur.minXP) / (nxt.minXP - cur.minXP) * 100);
}
function loadXP() { try { return parseInt(localStorage.getItem('frXP') || '0'); } catch(e) { return 0; } }
function saveXP(xp) { try { localStorage.setItem('frXP', String(xp)); } catch(e) {} }

function addXP(amount, x, y) {
  const old = loadXP();
  const oldLv = getLevel(old);
  const newXP = old + amount;
  saveXP(newXP);
  const newLv = getLevel(newXP);
  if (newLv.id > oldLv.id) showLevelUp(newLv);
  updateLevelUI();
  if (x !== undefined) showXPPopup(amount, x, y);
  return newXP;
}

function updateLevelUI() {
  const xp = loadXP();
  const lv = getLevel(xp);
  const nxt = getNextLevel(xp);
  const pct = getXPProgress(xp);
  document.getElementById('lvIcon').textContent = lv.icon;
  document.getElementById('lvName').style.color = lv.color;
  document.getElementById('lvName').textContent = lv.zh;
  document.getElementById('lvXP').textContent = xp + ' XP';
  document.getElementById('xpBar').style.width = pct + '%';
  const tip = nxt ? `距 ${nxt.zh} 还需 ${nxt.minXP - xp} XP` : '已达最高等级！';
  document.getElementById('xpBarWrap').title = tip;
  const wsXP = document.getElementById('wsXP');
  if (wsXP) wsXP.textContent = xp;
}

function showLevelUp(lv) {
  const el = document.createElement('div');
  el.className = 'levelup-toast';
  el.innerHTML = `${lv.icon} 恭喜升级！你现在是 <b>${lv.zh} · ${lv.name}</b>`;
  document.body.appendChild(el);
  setTimeout(() => el.classList.add('show'), 50);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 500); }, 3000);
}

function showXPPopup(amount, x, y) {
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = '+' + amount + ' XP';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

<script>
// ══════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════
function renderSidebar(list) {
  const el = document.getElementById('verbList');
  const groups = {};
  const order = ["不规则动词", "-er 动词", "-ir 动词", "-re 动词"];
  list.forEach(v => {
    if (!groups[v.group]) groups[v.group] = [];
    groups[v.group].push(v);
  });
  document.getElementById('countLabel').textContent = list.length;
  el.innerHTML = order.map(g => {
    if (!groups[g] || !groups[g].length) return '';
    return `<div class="group-label">${g}</div>` +
      groups[g].map(v => {
        const idx = VERBS.indexOf(v);
        return `<div class="verb-item ${currentVerb && currentVerb.fr === v.fr ? 'active' : ''}" onclick="selectVerb(${idx})">
          <div class="vi-left">
            <div class="vi-fr">${v.fr}</div>
            <div class="vi-zh">${v.zh}</div>
          </div>
          ${v.irr ? '<span class="vi-irr">irrég.</span>' : ''}
        </div>`;
      }).join('');
  }).join('');
}

function filterVerbs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? VERBS.filter(v => v.fr.toLowerCase().includes(q) || v.zh.includes(q)) : VERBS;
  renderSidebar(filtered);
}

function getFilteredVerbs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return q ? VERBS.filter(v => v.fr.toLowerCase().includes(q) || v.zh.includes(q)) : VERBS;
}

function selectVerb(idx) {
  currentVerb = VERBS[idx];
  currentMode = 'learn';
  currentTense = 'pres';
  quizState = { correct:0, wrong:0, history:[], q:null };
  cardState = { idx:0, pronounIdx:0, flipped:false };
  renderSidebar(getFilteredVerbs());
  renderMain();
  closeSidebar();
}

// ══════════════════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════════════════
function renderMain() {
  if (!currentVerb) return;
  const v = currentVerb;
  const main = document.getElementById('mainArea');

  const heroHTML = `
    <div class="verb-hero">
      <div class="vh-title">${v.fr}</div>
      <button class="vh-speak-btn speak-btn" onclick="speakEl(this)" data-text="${v.fr}" title="朗读动词">🔊</button>
    </div>
    <div class="vh-meta" style="margin-bottom:16px;">
      <span class="vh-meaning" style="font-size:15px;color:var(--muted)">${v.zh}</span>
      <div class="tags">
        <span class="tag">${v.group}</span>
        ${v.irr ? '<span class="tag irr">irrégulier</span>' : ''}
      </div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab ${currentMode==='learn'?'active':''}" onclick="setMode('learn')">学习</button>
      <button class="mode-tab ${currentMode==='passage'?'active':''}" onclick="setMode('passage')">短文</button>
      <button class="mode-tab ${currentMode==='cards'?'active':''}" onclick="setMode('cards')">卡片</button>
      <button class="mode-tab ${currentMode==='quiz'?'active':''}" onclick="setMode('quiz')">测验</button>
    </div>`;

  let body = '';
  if (currentMode === 'learn')   body = renderLearnMode(v);
  else if (currentMode === 'passage') body = renderPassageMode(v);
  else if (currentMode === 'quiz')    body = renderQuizMode();
  else                               body = renderCardsMode(v);

  main.innerHTML = `<div class="verb-page">${heroHTML}${body}</div>`;

  if (currentMode === 'quiz') {
    const inp = document.getElementById('quizInput');
    if (inp) {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitQuiz(); });
      setTimeout(() => inp.focus(), 80);
    }
  }
}

// ══════════════════════════════════════════════════════
// LEARN MODE
// ══════════════════════════════════════════════════════
function renderLearnMode(v) {
  const tenseNav = `<div class="tense-nav">
    ${TENSES.map(t => `<button class="tense-btn ${t.key===currentTense?'active':''}" onclick="setTense('${t.key}')">${t.zh}</button>`).join('')}
  </div>`;

  const forms = v[currentTense];
  const cells = PRONOUNS.map((p, i) => {
    const form = forms[i];
    return `<div class="conj-cell">
      <div class="cc-left">
        <div class="cc-pron">${p}</div>
        <div class="cc-form"><span class="cc-end">${form}</span></div>
      </div>
      <button class="speak-btn" onclick="speakEl(this)" data-text="${form}" title="朗读">🔊</button>
    </div>`;
  }).join('');

  const exHTML = v.ex.map(e => `
    <div class="example">
      <div class="ex-text">
        <div class="ex-fr">${e.fr}</div>
        <div class="ex-zh">${e.zh}</div>
      </div>
      <button class="speak-btn ex-speak" onclick="speakEl(this)" data-text="${e.fr}" title="朗读例句">🔊</button>
    </div>`).join('');

  const aiCached = aiExamplesCache[v.fr];
  const aiSection = aiCached
    ? `<div class="section-label ai-label">✦ AI 生成例句</div>
       <div class="examples">
         ${aiCached.map(e => `<div class="example ai-ex">
           <div class="ex-text"><div class="ex-fr">${e.fr}</div><div class="ex-zh">${e.zh}</div></div>
           <button class="speak-btn ex-speak" onclick="speakEl(this)" data-text="${e.fr}" title="朗读">🔊</button>
         </div>`).join('')}
       </div>`
    : `<button class="ai-btn" id="aiBtn" onclick="generateExamples()">✦ AI 生成更多例句</button>
       <div id="aiResult"></div>`;

  return `
    ${tenseNav}
    <button class="speak-all-btn" id="speakAllBtn" onclick="speakAll()">🔊 朗读全部变位</button>
    <div class="conj-grid">${cells}</div>
    <div class="section-label">例句 — Exemples</div>
    <div class="examples">${exHTML}</div>
    ${aiSection}`;
}

// ══════════════════════════════════════════════════════
// PASSAGE MODE (时态短文)
// ══════════════════════════════════════════════════════
function renderPassageMode(v) {
  const tenseNav = `<div class="tense-nav">
    ${TENSES.map(t => `<button class="tense-btn ${t.key===currentTense?'active':''}" onclick="setTensePassage('${t.key}')">${t.zh}</button>`).join('')}
  </div>`;

  const key = v.fr;
  const tKey = currentTense;

  // Check static passages first, then cache
  const staticPassage = PASSAGES[key] && PASSAGES[key][tKey];
  const cached = passageCache[key + '_' + tKey];
  const passage = staticPassage || cached;

  let passageHTML = '';
  if (passage) {
    // Build highlighted text from segments
    let textHTML = '';
    if (passage.segs) {
      textHTML = passage.segs.map(s => s.h
        ? `<span class="ph">${s.fr}</span>`
        : s.fr
      ).join('');
    } else if (passage.text) {
      // Legacy format
      textHTML = passage.text.map(s => s.highlight
        ? `<span class="ph">${s.fr}</span>`
        : s.fr
      ).join('');
    }

    const fullText = passage.segs
      ? passage.segs.map(s => s.fr).join('')
      : (passage.text ? passage.text.map(s => s.fr).join('') : '');

    passageHTML = `
      <div class="passage-wrap">
        <div class="passage-header">
          <div class="passage-title">${passage.title}</div>
          <div class="passage-title-zh">${passage.zh_title}</div>
        </div>
        <div class="passage-actions">
          <button class="passage-speak-btn" onclick="speakPassage()" data-text="${fullText.replace(/"/g,'&quot;')}">🔊 朗读短文</button>
          <button class="ai-passage-btn" id="aiPassageBtn" onclick="generatePassage()">✦ AI 换一篇</button>
        </div>
        <div class="passage-text">${textHTML}</div>
        <div class="passage-zh">${passage.zh}</div>
        <div class="passage-note">📌 ${passage.note}</div>
      </div>`;
  } else {
    passageHTML = `
      <div class="passage-wrap">
        <button class="ai-passage-btn" id="aiPassageBtn" onclick="generatePassage()" style="margin-bottom:16px;">
          ✦ AI 生成「${v.fr}」${TENSES.find(t=>t.key===tKey).zh}短文
        </button>
        <div id="passageResult"></div>
      </div>`;
  }

  return `${tenseNav}${passageHTML}`;
}

function setTensePassage(t) {
  currentTense = t;
  if (currentMode === 'passage') renderMain();
  else { currentMode = 'passage'; renderMain(); }
}

async function generatePassage() {
  const v = currentVerb;
  if (!v) return;
  const tObj = TENSES.find(t => t.key === currentTense);
  const btn = document.getElementById('aiPassageBtn');
  if (btn) { btn.disabled = true; btn.textContent = '✦ 生成中…'; }

  const resultEl = document.getElementById('passageResult');
  if (resultEl) resultEl.innerHTML = '<div class="ai-loading"><span></span><span></span><span></span></div>';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{ role:'user', content:
          `为法语动词 "${v.fr}"（${v.zh}）的「${tObj.fr}」（${tObj.zh}）写一篇短文练习。
要求：
1. 短文约4-6句，覆盖尽量多的人称变化
2. 场景要贴近日常生活（家庭、旅行、工作、学习等）
3. 把该时态的所有变位形式用 **加粗** 标注
4. 给出中文翻译
5. 给出一句语法要点说明
6. 输出格式（严格按照此JSON，不要其他文字）：
{
  "title": "短文法语标题",
  "zh_title": "中文标题",
  "text": "完整法语短文，变位形式用**包裹",
  "zh": "中文翻译",
  "note": "语法要点"
}`
        }]
      })
    });
    const data = await resp.json();
    const raw = data.content[0].text.trim().replace(/^```json|^```|```$/gm,'').trim();
    const parsed = JSON.parse(raw);

    // Convert **bold** to highlighted segments
    const segs = [];
    const parts = parsed.text.split(/\*\*([^*]+)\*\*/g);
    parts.forEach((p, i) => segs.push(i % 2 === 0 ? {fr:p} : {fr:p, h:1}));

    const passage = {
      title: parsed.title, zh_title: parsed.zh_title,
      segs, zh: parsed.zh, note: parsed.note
    };
    passageCache[v.fr + '_' + currentTense] = passage;
    renderMain();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '✦ AI 生成短文'; }
    if (resultEl) resultEl.innerHTML = '<div style="color:var(--accent);font-size:12px;padding:8px 0">生成失败，请重试。</div>';
  }
}

function speakPassage() {
  const v = currentVerb;
  if (!v) return;
  const tKey = currentTense;
  const staticP = PASSAGES[v.fr] && PASSAGES[v.fr][tKey];
  const cached = passageCache[v.fr + '_' + tKey];
  const p = staticP || cached;
  if (!p) return;
  const text = p.segs ? p.segs.map(s => s.fr).join('') : '';
  speak(text, 'fr-FR');
}

// ══════════════════════════════════════════════════════
// AI EXAMPLES
// ══════════════════════════════════════════════════════
async function generateExamples() {
  const v = currentVerb;
  if (!v) return;
  const btn = document.getElementById('aiBtn');
  const result = document.getElementById('aiResult');
  if (!btn || !result) return;
  btn.disabled = true; btn.textContent = '✦ 生成中…';
  result.innerHTML = '<div class="ai-loading"><span></span><span></span><span></span></div>';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{ role:'user', content:
          `为法语动词 "${v.fr}"（${v.zh}）生成5个实用例句，覆盖不同时态和场景。
只返回JSON数组，不要其他文字：
[{"fr":"法语例句","zh":"中文翻译"},...]`
        }]
      })
    });
    const data = await resp.json();
    const raw = data.content[0].text.trim().replace(/^```json|^```|```$/gm,'').trim();
    const examples = JSON.parse(raw);
    aiExamplesCache[v.fr] = examples;
    result.innerHTML = `
      <div class="section-label ai-label" style="margin-top:8px;">✦ AI 生成例句</div>
      <div class="examples">
        ${examples.map(e => `<div class="example ai-ex">
          <div class="ex-text"><div class="ex-fr">${e.fr}</div><div class="ex-zh">${e.zh}</div></div>
          <button class="speak-btn ex-speak" onclick="speakEl(this)" data-text="${e.fr.replace(/"/g,'&quot;')}" title="朗读">🔊</button>
        </div>`).join('')}
      </div>`;
    btn.style.display = 'none';
    addXP(5);
  } catch(e) {
    btn.disabled = false; btn.textContent = '✦ AI 生成更多例句';
    result.innerHTML = '<div style="color:var(--accent);font-size:12px;">生成失败，请重试。</div>';
  }
}

// ══════════════════════════════════════════════════════
// QUIZ MODE
// ══════════════════════════════════════════════════════
function newQuizQuestion() {
  const tKey = TENSES[Math.floor(Math.random() * TENSES.length)].key;
  const pIdx = Math.floor(Math.random() * 6);
  quizState.q = { tKey, pIdx,
    tLabel: TENSES.find(t => t.key === tKey).zh,
    answer: currentVerb[tKey][pIdx]
  };
}

function renderQuizMode() {
  const q = quizState.q;
  const histHTML = quizState.history.map(h =>
    `<div class="qh-dot ${h?'correct':'wrong'}"></div>`).join('');
  const acc = quizState.correct + quizState.wrong > 0
    ? Math.round(quizState.correct / (quizState.correct + quizState.wrong) * 100) : 0;
  return `
    <div class="quiz-stats">
      <div class="qs-item"><div class="qs-num correct">${quizState.correct}</div><div class="qs-label">正确</div></div>
      <div class="qs-item"><div class="qs-num wrong">${quizState.wrong}</div><div class="qs-label">错误</div></div>
      <div class="qs-item"><div class="qs-num" style="color:var(--gold)">${acc}%</div><div class="qs-label">正确率</div></div>
    </div>
    <div class="quiz-card">
      <div class="qc-tense">${q.tLabel} · ${TENSES.find(t=>t.key===q.tKey).fr}</div>
      <div class="qc-verb">${currentVerb.fr}</div>
      <div class="qc-pron">${PRONOUNS[q.pIdx]}</div>
      <input class="quiz-input" id="quizInput" placeholder="输入变位形式…" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="quiz-btn" onclick="submitQuiz()">确认</button>
    </div>
    <div class="quiz-history">${histHTML}</div>`;
}

function submitQuiz() {
  const inp = document.getElementById('quizInput');
  const fb = document.getElementById('quizFeedback');
  if (!inp || !fb) return;
  const val = inp.value.trim().toLowerCase();
  const ans = quizState.q.answer.toLowerCase();
  const correct = val === ans || val === ans.replace(/^j'/,"je ");

  if (correct) {
    quizState.correct++;
    quizState.history.push(true);
    inp.classList.add('correct');
    fb.className = 'quiz-feedback correct';
    fb.textContent = '✓ 正确！';
    const xpAmt = 10;
    const rect = inp.getBoundingClientRect();
    addXP(xpAmt, rect.left + rect.width/2, rect.top - 10);
  } else {
    quizState.wrong++;
    quizState.history.push(false);
    inp.classList.add('wrong');
    fb.className = 'quiz-feedback wrong';
    fb.innerHTML = `✗ 正确答案：<em>${quizState.q.answer}</em>`;
  }

  inp.disabled = true;
  document.querySelector('.quiz-btn').textContent = '下一题 →';
  document.querySelector('.quiz-btn').onclick = nextQuiz;
}

function nextQuiz() {
  newQuizQuestion();
  renderMain();
  setTimeout(() => { const inp = document.getElementById('quizInput'); if(inp) inp.focus(); }, 80);
}

// ══════════════════════════════════════════════════════
// CARDS MODE
// ══════════════════════════════════════════════════════
function renderCardsMode(v) {
  const tenseNav = `<div class="tense-nav">
    ${TENSES.map(t => `<button class="tense-btn ${t.key===currentTense?'active':''}" onclick="setTense('${t.key}')">${t.zh}</button>`).join('')}
  </div>`;

  const forms = v[currentTense];
  const pIdx = cardState.pronounIdx;
  const form = forms[pIdx];
  const pron = PRONOUNS[pIdx];

  return `${tenseNav}
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner ${cardState.flipped?'flipped':''}" id="cardInner">
        <div class="card-face">
          <div class="card-pron">${pron}</div>
          <div class="card-form" style="font-size:28px;color:var(--muted)">???</div>
          <div class="card-hint">点击翻转</div>
        </div>
        <div class="card-face back">
          <div class="card-pron">${pron}</div>
          <div class="card-form">${form}</div>
          <button class="speak-btn" style="margin-top:12px;" onclick="event.stopPropagation();speakEl(this)" data-text="${form}">🔊</button>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn" onclick="prevCard()">← 上一个</button>
      <button class="fc-btn primary" onclick="nextCard()">下一个 →</button>
    </div>
    <div class="fc-counter">${pIdx + 1} / ${PRONOUNS.length} · ${TENSES.find(t=>t.key===currentTense).zh}</div>`;
}

function flipCard() {
  cardState.flipped = !cardState.flipped;
  const el = document.getElementById('cardInner');
  if (el) el.classList.toggle('flipped', cardState.flipped);
}
function nextCard() {
  cardState.pronounIdx = (cardState.pronounIdx + 1) % PRONOUNS.length;
  cardState.flipped = false; renderMain();
}
function prevCard() {
  cardState.pronounIdx = (cardState.pronounIdx - 1 + PRONOUNS.length) % PRONOUNS.length;
  cardState.flipped = false; renderMain();
}

// ══════════════════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════════════════
let speakAllActive = false;

function speakEl(btn) {
  const text = btn.getAttribute('data-text');
  if (text) speak(text, 'fr-FR');
}

function speak(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang || 'fr-FR';
  utter.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang && v.lang.startsWith('fr'));
  if (frVoice) utter.voice = frVoice;
  window.speechSynthesis.speak(utter);
}

function speakAll() {
  if (!window.speechSynthesis || !currentVerb) return;
  const btn = document.getElementById('speakAllBtn');
  if (speakAllActive) {
    window.speechSynthesis.cancel();
    speakAllActive = false;
    if (btn) { btn.classList.remove('active'); btn.textContent = '🔊 朗读全部变位'; }
    return;
  }
  speakAllActive = true;
  if (btn) { btn.classList.add('active'); btn.textContent = '⏹ 停止朗读'; }
  const forms = currentVerb[currentTense];
  let idx = 0;
  function next() {
    if (!speakAllActive || idx >= PRONOUNS.length) {
      speakAllActive = false;
      if (btn) { btn.classList.remove('active'); btn.textContent = '🔊 朗读全部变位'; }
      return;
    }
    const pron = PRONOUNS[idx].replace("je / j'","je").replace("il / elle","il").replace("ils / elles","ils");
    const utter = new SpeechSynthesisUtterance(pron + ' ' + forms[idx]);
    utter.lang = 'fr-FR'; utter.rate = 0.82;
    const voices = window.speechSynthesis.getVoices();
    const frV = voices.find(v => v.lang && v.lang.startsWith('fr'));
    if (frV) utter.voice = frV;
    utter.onend = () => { idx++; setTimeout(next, 400); };
    utter.onerror = () => { idx++; setTimeout(next, 400); };
    window.speechSynthesis.speak(utter);
  }
  window.speechSynthesis.cancel();
  next();
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function setTense(t) { currentTense = t; renderMain(); }
function setMode(m) {
  currentMode = m;
  if (m === 'quiz') { quizState = { correct:0, wrong:0, history:[], q:null }; newQuizQuestion(); }
  if (m === 'cards') { cardState = { idx:0, pronounIdx:0, flipped:false }; }
  renderMain();
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// INIT
// ══════════════════════════════════════════════════════
renderSidebar(VERBS);
document.getElementById('wsTotalVerbs').textContent = VERBS.length;
updateLevelUI();
